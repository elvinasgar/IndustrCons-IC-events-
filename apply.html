<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apply — IC Events</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: { DEFAULT: '#0B0E14' },
          paper: { DEFAULT: '#F7F7F4' },
          blueprint: { 500:'#1E4FD8', 600:'#173CAA' },
          signal: { DEFAULT: '#F2A93B', deep: '#C97F1B' },
          steel: { 400:'#7B8492', 500:'#5C6472', 600:'#454B57' },
        },
        fontFamily: {
          display: ['"Space Grotesk"', 'system-ui', 'sans-serif'],
        }
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', system-ui, sans-serif; }
  .label-mono { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #1E4FD8; font-weight: 500; }
  .font-display { font-family: 'Space Grotesk', sans-serif; }
</style>
</head>
<body class="bg-paper text-ink">

  <header class="border-b border-ink/10">
    <div class="max-w-2xl mx-auto px-6 h-16 flex items-center">
      <a href="index.html" class="flex items-center gap-2">
        <div class="h-8 w-8 rounded-full bg-blueprint-500 flex items-center justify-center text-white font-display text-sm font-medium">IC</div>
        <span class="font-display font-medium tracking-tight">IC Events</span>
      </a>
    </div>
  </header>

  <section class="py-16">
    <div class="max-w-2xl mx-auto px-6">
      <span class="label-mono">APPLICATION</span>
      <h1 class="mt-3 font-display text-3xl font-medium tracking-tight">Apply to IndustrCons.</h1>
      <p class="mt-3 text-steel-600 leading-relaxed">
        Tell us what you'd like to do. We review every application by hand and reply by email.
      </p>

      <!-- Choice toggle -->
      <div class="mt-8 grid grid-cols-2 gap-3" id="type-toggle">
        <button type="button" data-type="license" class="type-btn rounded-xl border border-ink/15 p-4 text-left">
          <p class="font-display font-medium">Chapter license</p>
          <p class="text-xs text-steel-500 mt-1">I want to run IndustrCons events in my city.</p>
        </button>
        <button type="button" data-type="event" class="type-btn rounded-xl border border-ink/15 p-4 text-left">
          <p class="font-display font-medium">Propose an event</p>
          <p class="text-xs text-steel-500 mt-1">I already have a chapter, I want to run one event.</p>
        </button>
      </div>

      <!-- FORM -->
      <!--
        HOW TO CONNECT THIS FORM (no code needed):
        1. Go to https://formspree.io and create a free account.
        2. Create a new form, it gives you a URL like
           https://formspree.io/f/abcd1234
        3. Replace YOUR_FORM_ID below (in the action="...") with that code.
        That's it — submissions will arrive in your email.
      -->
      <form
        action="https://formspree.io/f/YOUR_FORM_ID"
        method="POST"
        class="mt-8 flex flex-col gap-5"
      >
        <input type="hidden" name="application_type" id="application_type" value="license" />

        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium" for="full_name">Full name</label>
          <input id="full_name" name="full_name" required
            class="h-11 rounded-lg border border-ink/15 bg-white px-3.5 text-sm outline-none focus:border-blueprint-500" />
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium" for="email">Email</label>
          <input id="email" name="email" type="email" required
            class="h-11 rounded-lg border border-ink/15 bg-white px-3.5 text-sm outline-none focus:border-blueprint-500" />
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium" for="city">City / Region</label>
          <input id="city" name="city" required
            class="h-11 rounded-lg border border-ink/15 bg-white px-3.5 text-sm outline-none focus:border-blueprint-500" />
        </div>

        <!-- License-only field -->
        <div class="flex flex-col gap-2 conditional-field" data-show-for="license">
          <label class="text-sm font-medium" for="organization">Organization (if any)</label>
          <input id="organization" name="organization"
            class="h-11 rounded-lg border border-ink/15 bg-white px-3.5 text-sm outline-none focus:border-blueprint-500" />
        </div>

        <!-- Event-only fields -->
        <div class="flex flex-col gap-2 conditional-field" data-show-for="event">
          <label class="text-sm font-medium" for="event_date">Proposed date</label>
          <input id="event_date" name="event_date" type="date"
            class="h-11 rounded-lg border border-ink/15 bg-white px-3.5 text-sm outline-none focus:border-blueprint-500" />
        </div>
        <div class="flex flex-col gap-2 conditional-field" data-show-for="event">
          <label class="text-sm font-medium" for="expected_attendees">Expected attendees</label>
          <input id="expected_attendees" name="expected_attendees" type="number" min="1"
            class="h-11 rounded-lg border border-ink/15 bg-white px-3.5 text-sm outline-none focus:border-blueprint-500" />
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium" for="message">Tell us more</label>
          <textarea id="message" name="message" rows="4" required
            class="rounded-lg border border-ink/15 bg-white px-3.5 py-3 text-sm outline-none focus:border-blueprint-500"></textarea>
        </div>

        <button type="submit"
          class="mt-2 bg-blueprint-500 text-white px-5 py-3 rounded-full text-sm font-medium">
          Submit application
        </button>
      </form>
    </div>
  </section>

  <footer class="py-10 text-center text-xs text-steel-400">
    © 2026 IndustrCons Event. All rights reserved.
  </footer>

  <script>
    const typeInput = document.getElementById('application_type');
    const buttons = document.querySelectorAll('.type-btn');
    const conditionalFields = document.querySelectorAll('.conditional-field');

    function setType(type) {
      typeInput.value = type;
      buttons.forEach(btn => {
        if (btn.dataset.type === type) {
          btn.classList.add('border-blueprint-500', 'bg-blueprint-50');
          btn.classList.remove('border-ink/15');
        } else {
          btn.classList.remove('border-blueprint-500', 'bg-blueprint-50');
          btn.classList.add('border-ink/15');
        }
      });
      conditionalFields.forEach(field => {
        field.style.display = field.dataset.showFor === type ? 'flex' : 'none';
      });
    }

    buttons.forEach(btn => btn.addEventListener('click', () => setType(btn.dataset.type)));

    // Preselect from URL, e.g. apply.html?type=event
    const params = new URLSearchParams(window.location.search);
    const initialType = params.get('type') === 'event' ? 'event' : 'license';
    setType(initialType);
  </script>

</body>
</html>
